# ── Model aliases ──────────────────────────────────────────────────
# Maps alternative names → canonical model key within the same provider.
# Used when the frontend label or user input doesn't match the API model id.

[aliases.deepseek]
v4_pro = "deepseek-v4-pro"
v4-pro = "deepseek-v4-pro"
chat = "deepseek-chat"
v3 = "deepseek-chat"
reasoner = "deepseek-reasoner"
r1 = "deepseek-reasoner"
