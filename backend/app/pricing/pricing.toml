version = "2026-07-01"
default_currency = "USD"
cny_per_usd = 6.79

# ── DeepSeek models ────────────────────────────────────────────────
# Sources: https://api-docs.deepseek.com/quick_start/pricing
# Model keys MUST match the API model_name strings used in provider calls.

[providers.deepseek.models.deepseek-chat]
