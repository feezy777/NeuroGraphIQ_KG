version: 1
design: split_table_by_granularity

granularity_levels:
  - major
  - sub
  - allen

tables:
  regions:
    major: major_brain_region
    sub: sub_brain_region
    allen: allen_brain_region
  connections:
    major: major_connection
    sub: sub_connection
    allen: allen_connection
  circuits:
    major: major_circuit
    sub: sub_circuit
    allen: allen_circuit

relations:
  circuit_node:
    major: major_circuit_node
    sub: sub_circuit_node
    allen: allen_circuit_node
  circuit_connection:
    major: major_circuit_connection
    sub: sub_circuit_connection
    allen: allen_circuit_connection
  connection_evidence:
    major: major_connection_evidence
    sub: sub_connection_evidence
    allen: allen_connection_evidence
  circuit_evidence:
    major: major_circuit_evidence
    sub: sub_circuit_evidence
    allen: allen_circuit_evidence

extensions:
  allen_region: allen_brain_region_ext
  structural_connection:
    major: major_connection_structural_ext
    sub: sub_connection_structural_ext
    allen: allen_connection_structural_ext
  functional_connection:
    major: major_connection_functional_ext
    sub: sub_connection_functional_ext
    allen: allen_connection_functional_ext
  functional_circuit:
    major: major_circuit_functional_ext
    sub: sub_circuit_functional_ext
    allen: allen_circuit_functional_ext

rationale:
  - stronger isolation and governance by level
  - easier phased migration and rollback by level
  - tradeoff: higher query complexity for cross-level analytics
