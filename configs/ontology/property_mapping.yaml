version: 1

object_properties:
  has_system:
    domain: Organism
    range: AnatomicalSystem
    fk: anatomical_system.organism_id
  has_organ:
    domain: AnatomicalSystem
    range: Organ
    fk: organ.system_id
  has_division:
    domain: Organ
    range: BrainDivision
    fk: brain_division.organ_id
  has_region:
    domain: BrainDivision
    range: MajorBrainRegion
    fk: major_brain_region.division_id
  has_subregion:
    domain: MajorBrainRegion
    range: SubBrainRegion
    fk: sub_brain_region.parent_major_region_id

  has_source:
    major: major_connection.source_major_region_id
    sub: sub_connection.source_sub_region_id
    allen: allen_connection.source_allen_region_id
  has_target:
    major: major_connection.target_major_region_id
    sub: sub_connection.target_sub_region_id
    allen: allen_connection.target_allen_region_id

  has_node:
    major: major_circuit_node(major_circuit_id, major_region_id)
    sub: sub_circuit_node(sub_circuit_id, sub_region_id)
    allen: allen_circuit_node(allen_circuit_id, allen_region_id)
  has_connection:
    major: major_circuit_connection(major_circuit_id, major_connection_id)
    sub: sub_circuit_connection(sub_circuit_id, sub_connection_id)
    allen: allen_circuit_connection(allen_circuit_id, allen_connection_id)

  supported_by_connection:
    major: major_connection_evidence(major_connection_id, evidence_id)
    sub: sub_connection_evidence(sub_connection_id, evidence_id)
    allen: allen_connection_evidence(allen_connection_id, evidence_id)
  supported_by_circuit:
    major: major_circuit_evidence(major_circuit_id, evidence_id)
    sub: sub_circuit_evidence(sub_circuit_id, evidence_id)
    allen: allen_circuit_evidence(allen_circuit_id, evidence_id)

data_properties:
  common_name_fields:
    - en_name
    - cn_name
    - alias
    - description
  common_meta_fields:
    - data_source
    - status
    - remark
    - created_at
    - updated_at
