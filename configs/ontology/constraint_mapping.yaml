version: 1

uniqueness:
  - organism.organism_code
  - anatomical_system.system_code
  - organ.organ_code
  - brain_division.division_code
  - major_brain_region.region_code
  - sub_brain_region.region_code
  - allen_brain_region.region_code
  - major_connection.connection_code
  - sub_connection.connection_code
  - allen_connection.connection_code
  - major_circuit.circuit_code
  - sub_circuit.circuit_code
  - allen_circuit.circuit_code
  - evidence.evidence_code

checks:
  division_type:
    table: brain_division
    values: [brain_lobe, non_lobe_division]
  laterality:
    tables: [major_brain_region, sub_brain_region, allen_brain_region]
    values: [left, right, midline, bilateral]
  connection_modality:
    tables: [major_connection, sub_connection, allen_connection]
    values: [structural, functional, effective, unknown]
  circuit_kind:
    tables: [major_circuit, sub_circuit, allen_circuit]
    values: [structural, functional, inferred, unknown]
  loop_type:
    tables: [major_circuit, sub_circuit, allen_circuit]
    values: [strict, inferred, functional]
  evidence_type:
    table: evidence
    values: [paper, abstract, database_record, review, manual_note]

fk_policy:
  hierarchy_fk_delete: set_null
  relation_fk_delete: cascade
  connection_source_target_delete: restrict

todo:
  - add trigger checks for cross-level consistency major->sub->allen
  - add trigger checks for structural/functional extension consistency
  - add export-view consistency checks for RDF generation
