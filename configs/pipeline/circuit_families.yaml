version: 1
description: >
  Major-level circuit family templates for recall -> instantiate -> decompose flow.
  This file is ontology-aware but intentionally coarse-grained for V2.

families:
  - circuit_family: corticostriatal_thalamocortical
    functional_domain: motor_control
    core_node_aliases:
      - [cortex, frontal cortex, prefrontal cortex, motor cortex, cingulate cortex]
      - [caudate, putamen, striatum, accumbens, pallidum, globus pallidus]
      - [thalamus, thalamus proper]
    optional_node_aliases:
      - [supplementary motor area, premotor cortex]
      - [brain stem]
    compressed_rules:
      allow_missing_core: 1
      allow_semantic_compression: true
    aliases:
      - cortico-striato-thalamo-cortical
      - cstc
      - basal ganglia loop
    recommended_search_queries:
      - corticostriatal thalamocortical circuit review
      - basal ganglia thalamus cortex pathway human
    allowed_relation_types:
      - direct_structural_connection
      - indirect_pathway_connection
      - same_circuit_member

