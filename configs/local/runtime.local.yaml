database:
  backend: "postgres"
  admin_db:
    host: "localhost"
    port: 5432
    dbname: "postgres"
    user: "postgres"
    password: "root"
  workbench_db:
    host: "localhost"
    port: 5432
    dbname: "NeuroGraphIQ_Workbench"
    schema: "workbench"
    user: "postgres"
    password: "root"
  unverified_db:
    host: "localhost"
    port: 5432
    dbname: "NeuroGraphIQ_KG_Unverified"
    schema: "neurokg_unverified"
    user: "postgres"
    password: "root"
  production_db:
    host: "localhost"
    port: 5432
    dbname: "neurographiq_kg_v2"
    schema: "neurokg"
    user: "postgres"
    password: "root"

deepseek:
  enabled: false
  api_key: ""
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
  temperature: 0.2

pipeline:
  auto_parse_on_upload: true
  auto_extract_on_parse: false
  auto_validate_on_extract: false
  normalize_mode_default: "local"
  validate_mode_default: "local"

ui:
  language: "zh-CN"
